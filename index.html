<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسک‌فلو | TaskFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&amp;display=swap');
        body { font-family: 'Vazirmatn', system-ui, sans-serif; }
        .task-card { transition: all 0.2s ease; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .priority-high { border-right: 4px solid #ef4444; }
        .priority-medium { border-right: 4px solid #f59e0b; }
        .priority-low { border-right: 4px solid #22c55e; }
        .dark .task-card { background-color: #1f2937; }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100">
    <!-- Header -->
    <header class="bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-11 h-11 bg-indigo-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-tasks text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">TaskFlow</h1>
                    <p class="text-xs text-zinc-500 dark:text-zinc-400">مدیریت تسک سبک و سریع</p>
                </div>
            </div>
            
            <div class="flex items-center gap-x-2">
                <button onclick="toggleDarkMode()" 
                        class="px-4 py-2 rounded-2xl bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors flex items-center gap-x-2 text-sm">
                    <i class="fa-solid fa-moon dark:hidden"></i>
                    <i class="fa-solid fa-sun hidden dark:block"></i>
                    <span class="hidden sm:inline">تم</span>
                </button>
                <div class="text-right">
                    <div class="text-sm font-medium">حامد فریفته</div>
                    <div class="text-[10px] text-zinc-500">Developer</div>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-5xl mx-auto px-4 py-8">
        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white dark:bg-zinc-900 rounded-3xl p-5 border border-zinc-200 dark:border-zinc-800">
                <div class="text-zinc-500 text-sm">کل تسک‌ها</div>
                <div id="total-tasks" class="text-4xl font-bold mt-1">0</div>
            </div>
            <div class="bg-white dark:bg-zinc-900 rounded-3xl p-5 border border-zinc-200 dark:border-zinc-800">
                <div class="text-zinc-500 text-sm">در حال انجام</div>
                <div id="active-tasks" class="text-4xl font-bold mt-1 text-amber-500">0</div>
            </div>
            <div class="bg-white dark:bg-zinc-900 rounded-3xl p-5 border border-zinc-200 dark:border-zinc-800">
                <div class="text-zinc-500 text-sm">انجام شده</div>
                <div id="completed-tasks" class="text-4xl font-bold mt-1 text-emerald-500">0</div>
            </div>
            <div class="bg-white dark:bg-zinc-900 rounded-3xl p-5 border border-zinc-200 dark:border-zinc-800 flex flex-col justify-center">
                <div class="text-sm text-zinc-500 mb-1">درصد پیشرفت</div>
                <div class="flex items-center gap-x-3">
                    <div id="progress-bar" class="flex-1 h-2.5 bg-zinc-200 dark:bg-zinc-700 rounded-full overflow-hidden">
                        <div id="progress-fill" class="h-full bg-emerald-500 transition-all" style="width: 0%"></div>
                    </div>
                    <div id="progress-text" class="font-mono text-sm font-medium">0%</div>
                </div>
            </div>
        </div>

        <!-- Add Task Form -->
        <div class="bg-white dark:bg-zinc-900 rounded-3xl border border-zinc-200 dark:border-zinc-800 p-6 mb-8">
            <h2 class="font-semibold text-xl mb-4 flex items-center gap-x-2">
                <i class="fa-solid fa-plus text-indigo-500"></i> 
                <span>افزودن تسک جدید</span>
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                <div class="md:col-span-5">
                    <input id="task-title" type="text" placeholder="عنوان تسک" 
                           class="w-full px-4 py-3 rounded-2xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-950 focus:outline-none focus:border-indigo-500">
                </div>
                <div class="md:col-span-4">
                    <input id="task-desc" type="text" placeholder="توضیح کوتاه (optional)" 
                           class="w-full px-4 py-3 rounded-2xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-950 focus:outline-none focus:border-indigo-500">
                </div>
                <div class="md:col-span-3">
                    <select id="task-priority" class="w-full px-4 py-3 rounded-2xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-950">
                        <option value="high">اولویت بالا</option>
                        <option value="medium" selected>اولویت متوسط</option>
                        <option value="low">اولویت پایین</option>
                    </select>
                </div>
                
                <div class="md:col-span-4">
                    <input id="task-due" type="date" class="w-full px-4 py-3 rounded-2xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-950">
                </div>
                
                <div class="md:col-span-8 flex items-end">
                    <button onclick="addTask()" 
                            class="w-full md:w-auto px-8 py-3 bg-indigo-600 hover:bg-indigo-700 transition-colors text-white font-medium rounded-2xl flex items-center justify-center gap-x-2">
                        <i class="fa-solid fa-plus"></i>
                        <span>افزودن تسک</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Filters & Search -->
        <div class="flex flex-col md:flex-row gap-4 mb-6 items-center">
            <div class="flex-1">
                <div class="relative">
                    <i class="fa-solid fa-search absolute right-4 top-4 text-zinc-400"></i>
                    <input id="search-input" type="text" placeholder="جستجو در تسک‌ها..." 
                           onkeyup="filterTasks()"
                           class="w-full pl-4 pr-12 py-3 rounded-2xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-950">
                </div>
            </div>
            
            <div class="flex gap-2 flex-wrap">
                <button onclick="filterTasks('all')" id="filter-all"
                        class="px-5 py-2.5 text-sm font-medium rounded-2xl bg-indigo-600 text-white"> همه </button>
                <button onclick="filterTasks('active')" id="filter-active"
                        class="px-5 py-2.5 text-sm font-medium rounded-2xl bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 hover:bg-zinc-100 dark:hover:bg-zinc-700"> در حال انجام </button>
                <button onclick="filterTasks('completed')" id="filter-completed"
                        class="px-5 py-2.5 text-sm font-medium rounded-2xl bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 hover:bg-zinc-100 dark:hover:bg-zinc-700"> انجام شده </button>
            </div>
        </div>

        <!-- Tasks List -->
        <div id="tasks-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Tasks will be rendered here by JS -->
        </div>

        <!-- Footer Actions -->
        <div class="mt-8 flex flex-col sm:flex-row gap-3 justify-between items-center text-sm">
            <div class="flex gap-3">
                <button onclick="exportData()" 
                        class="px-5 py-2.5 rounded-2xl border border-zinc-200 dark:border-zinc-700 hover:bg-zinc-100 dark:hover:bg-zinc-800 flex items-center gap-x-2">
                    <i class="fa-solid fa-download"></i>
                    <span>خروجی JSON</span>
                </button>
                <button onclick="importData()" 
                        class="px-5 py-2.5 rounded-2xl border border-zinc-200 dark:border-zinc-700 hover:bg-zinc-100 dark:hover:bg-zinc-800 flex items-center gap-x-2">
                    <i class="fa-solid fa-upload"></i>
                    <span>ورودی JSON</span>
                </button>
            </div>
            
            <button onclick="clearAllTasks()" 
                    class="px-5 py-2.5 text-red-500 hover:bg-red-50 dark:hover:bg-red-950/30 rounded-2xl flex items-center gap-x-2 text-sm">
                <i class="fa-solid fa-trash"></i>
                <span>پاک کردن همه</span>
            </button>
        </div>
    </div>

    <script>
        // Tailwind script
        function initTailwind() {
            document.documentElement.classList.add('dark');
        }

        let tasks = [];
        let currentFilter = 'all';

        function loadTasks() {
            const saved = localStorage.getItem('taskflow_tasks');
            if (saved) tasks = JSON.parse(saved);
            renderTasks();
            updateStats();
        }

        function saveTasks() {
            localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
        }

        function addTask() {
            const title = document.getElementById('task-title').value.trim();
            if (!title) {
                alert('لطفاً عنوان تسک را وارد کنید');
                return;
            }

            const newTask = {
                id: Date.now(),
                title: title,
                description: document.getElementById('task-desc').value.trim(),
                priority: document.getElementById('task-priority').value,
                dueDate: document.getElementById('task-due').value || null,
                completed: false,
                createdAt: new Date().toISOString()
            };

            tasks.unshift(newTask);
            saveTasks();
            renderTasks();
            updateStats();

            // Clear form
            document.getElementById('task-title').value = '';
            document.getElementById('task-desc').value = '';
            document.getElementById('task-due').value = '';
        }

        function toggleComplete(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        function deleteTask(id) {
            if (!confirm('آیا مطمئن هستید که می‌خواهید این تسک را حذف کنید؟')) return;
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
            updateStats();
        }

        function filterTasks(filter = null) {
            if (filter) currentFilter = filter;
            
            // Update active button styles
            document.querySelectorAll('[id^="filter-"]').forEach(btn => btn.classList.remove('bg-indigo-600', 'text-white'));
            document.querySelectorAll('[id^="filter-"]').forEach(btn => btn.classList.add('bg-white', 'dark:bg-zinc-800', 'border', 'border-zinc-200', 'dark:border-zinc-700'));
            
            const activeBtn = document.getElementById(`filter-${currentFilter}`);
            if (activeBtn) {
                activeBtn.classList.add('bg-indigo-600', 'text-white');
                activeBtn.classList.remove('bg-white', 'dark:bg-zinc-800', 'border', 'border-zinc-200', 'dark:border-zinc-700');
            }

            renderTasks();
        }

        function renderTasks() {
            const container = document.getElementById('tasks-list');
            container.innerHTML = '';

            const searchTerm = document.getElementById('search-input')?.value.toLowerCase() || '';

            let filtered = tasks;

            // Apply filter
            if (currentFilter === 'active') {
                filtered = filtered.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filtered = filtered.filter(t => t.completed);
            }

            // Apply search
            if (searchTerm) {
                filtered = filtered.filter(t => 
                    t.title.toLowerCase().includes(searchTerm) || 
                    (t.description && t.description.toLowerCase().includes(searchTerm))
                );
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12 text-zinc-400">
                        <i class="fa-solid fa-inbox text-5xl mb-4"></i>
                        <p>هیچ تسکی یافت نشد</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(task => {
                const dueDateText = task.dueDate ? new Date(task.dueDate).toLocaleDateString('fa-IR') : '';
                const isOverdue = task.dueDate && new Date(task.dueDate) < new Date() && !task.completed;

                const priorityClass = task.priority === 'high' ? 'priority-high' : 
                                     task.priority === 'medium' ? 'priority-medium' : 'priority-low';
                const priorityLabel = task.priority === 'high' ? 'بالا' : 
                                       task.priority === 'medium' ? 'متوسط' : 'پایین';

                const html = `
                    <div class="task-card bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-3xl p-5 ${priorityClass} ${task.completed ? 'opacity-75' : ''}">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-x-3">
                                <button onclick="toggleComplete(${task.id})" 
                                        class="w-6 h-6 flex-shrink-0 mt-0.5 rounded-xl border-2 flex items-center justify-center transition-all
                                        ${task.completed ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-zinc-300 dark:border-zinc-600 hover:border-emerald-400'}">
                                    ${task.completed ? '<i class="fa-solid fa-check text-xs"></i>' : ''}
                                </button>
                                <div class="font-medium text-lg ${task.completed ? 'line-through text-zinc-400' : ''}">${task.title}</div>
                            </div>
                            
                            <div class="flex items-center gap-x-1">
                                <span class="text-[10px] px-3 py-1 rounded-2xl font-medium 
                                    ${task.priority === 'high' ? 'bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400' : 
                                      task.priority === 'medium' ? 'bg-amber-100 text-amber-600 dark:bg-amber-900/30 dark:text-amber-400' : 
                                      'bg-emerald-100 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-400'}">
                                    ${priorityLabel}
                                </span>
                                <button onclick="deleteTask(${task.id})" class="text-red-400 hover:text-red-500 p-2">
                                    <i class="fa-solid fa-trash text-sm"></i>
                                </button>
                            </div>
                        </div>

                        ${task.description ? `<div class="text-sm text-zinc-600 dark:text-zinc-400 mb-3 pr-9">${task.description}</div>` : ''}

                        <div class="flex items-center justify-between text-xs">
                            <div class="flex items-center gap-x-4 text-zinc-500">
                                ${task.dueDate ? `
                                <div class="flex items-center gap-x-1.5 ${isOverdue ? 'text-red-500' : ''}">
                                    <i class="fa-regular fa-calendar"></i>
                                    <span>${dueDateText}</span>
                                </div>` : ''}
                            </div>
                            
                            <div class="text-[10px] text-zinc-400">
                                ${new Date(task.createdAt).toLocaleDateString('fa-IR')}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const active = total - completed;
            const progress = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('total-tasks').textContent = total;
            document.getElementById('active-tasks').textContent = active;
            document.getElementById('completed-tasks').textContent = completed;
            document.getElementById('progress-text').textContent = progress + '%';
            document.getElementById('progress-fill').style.width = progress + '%';
        }

        function filterTasksOnSearch() {
            renderTasks();
        }

        function exportData() {
            const dataStr = JSON.stringify(tasks, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = 'taskflow-backup.json';
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = event => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if (Array.isArray(imported)) {
                            tasks = imported;
                            saveTasks();
                            renderTasks();
                            updateStats();
                            alert('داده‌ها با موفقیت وارد شدند');
                        }
                    } catch(err) {
                        alert('فایل معتبر نیست');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function clearAllTasks() {
            if (!confirm('تمام تسک‌ها حذف شوند؟ این عمل قابل برگشت نیست.')) return;
            tasks = [];
            saveTasks();
            renderTasks();
            updateStats();
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('taskflow_dark', document.documentElement.classList.contains('dark'));
        }

        function initDarkMode() {
            const saved = localStorage.getItem('taskflow_dark');
            if (saved === 'false') {
                document.documentElement.classList.remove('dark');
            } else {
                document.documentElement.classList.add('dark');
            }
        }

        // Initialize everything
        function init() {
            initTailwind();
            initDarkMode();
            loadTasks();
            
            // Search listener
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('input', () => renderTasks());
            }

            // Initial filter button style
            const allBtn = document.getElementById('filter-all');
            if (allBtn) allBtn.classList.add('bg-indigo-600', 'text-white');

            // Keyboard support for adding task
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && document.activeElement.id === 'task-title') {
                    addTask();
                }
            });

            // Demo data if empty (first time)
            if (tasks.length === 0) {
                tasks = [
                    {
                        id: 1,
                        title: "بررسی پروژه TaskFlow",
                        description: "تکمیل و بررسی کد ها",
                        priority: "high",
                        dueDate: "2026-02-10",
                        completed: false,
                        createdAt: new Date().toISOString()
                    },
                    {
                        id: 2,
                        title: "اضافه کردن PWA منیفست",
                        description: "",
                        priority: "medium",
                        dueDate: null,
                        completed: true,
                        createdAt: new Date().toISOString()
                    }
                ];
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
